<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <title>Found For AI | Be Found by AI, Not Just Google</title>
    <meta name="description" content="Found For AI helps businesses get discovered by AI search engines like ChatGPT, Gemini, and Perplexity. We optimize your site's structure, schema, and content so you're visible to the new era of AI search." />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://foundforai.com" />
    
    <!-- JSON-LD Structured Data for Brand Identity -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Found For AI",
  "url": "https://foundforai.com",
  "logo": "https://foundforai.com/logo.png",
  "description": "Found For AI helps businesses become discoverable by AI search engines (ChatGPT, Gemini, Perplexity) with AI-first SEO, schema, and technical setup.",
  "founder": { "@type": "Person", "name": "Dustin Crump" },
  "sameAs": [
    "https://x.com/fripseai",
    "https://www.linkedin.com/in/fripse/"
  ]
}
    </script>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Found For AI",
  "url": "https://foundforai.com",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://foundforai.com/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
    </script>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Found For AI | Be Found by AI, Not Just Google" />
    <meta property="og:description" content="We help your business get discovered by AI assistants like ChatGPT, Gemini, and Perplexity." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foundforai.com" />
    <meta property="og:image" content="https://foundforai.com/logo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Found For AI | Be Found by AI, Not Just Google" />
    <meta name="twitter:description" content="Make your business visible to AI search. Schema, sitemaps, and structure that AI can read." />
    <meta name="twitter:image" content="https://foundforai.com/logo.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
