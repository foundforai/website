<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <title>Found For AI | The New Way to Be Discovered</title>
    <meta name="description" content="Found For AI helps businesses become visible in AI search engines like ChatGPT, Gemini, and Perplexity. We build your discoverability for the next era of search." />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://foundforai.com" />
    
    <!-- JSON-LD Structured Data for Brand Identity -->
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Found For AI",
  "alternateName": ["FoundForAI", "Found for AI Consulting", "Found For AI SEO"],
  "url": "https://foundforai.com",
  "logo": "https://foundforai.com/found-for-ai-logo-white.png",
  "image": [
    "https://foundforai.com/found-for-ai-logo-white.png",
    "https://foundforai.com/found-for-ai-logo-black.png"
  ],
  "description": "Found For AI helps businesses become discoverable inside AI assistants like ChatGPT, Gemini, and Perplexity through AEO (Answer Engine Optimization).",
  "founder": {
    "@type": "Person",
    "name": "Dustin Crump",
    "url": "https://www.linkedin.com/in/fripse"
  },
  "sameAs": [
    "https://www.linkedin.com/company/foundforai",
    "https://x.com/foundforai",
    "https://www.facebook.com/foundforai",
    "https://www.instagram.com/foundforai"
  ],
  "brand": { "@type": "Brand", "name": "Found For AI" }
}
    </script>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Found For AI",
  "url": "https://foundforai.com",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://foundforai.com/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
    </script>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="Found For AI — Be Found in AI Answers" />
    <meta property="og:description" content="We make your site discoverable inside AI assistants through AEO: schema, entities, sitemaps, and answer-ready content." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://foundforai.com" />
    <meta property="og:image" content="https://foundforai.com/found-for-ai-logo-white.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Found For AI — Be Found in AI Answers" />
    <meta name="twitter:description" content="AEO for AI search: entity schema, JSON-LD, sitemaps, and more." />
    <meta name="twitter:image" content="https://foundforai.com/found-for-ai-logo-white.png" />
    
    <!-- Favicons -->
    <link rel="icon" href="/found-for-ai-logo-white.png" sizes="32x32" type="image/png" />
    <link rel="icon" href="/found-for-ai-logo-white.png" sizes="192x192" type="image/png" />
    <link rel="apple-touch-icon" href="/found-for-ai-logo-white.png" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
