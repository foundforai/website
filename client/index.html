<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Critical CSS for above-the-fold content -->
    <style>
      html{line-height:1.5;-webkit-text-size-adjust:100%;scroll-behavior:smooth}
      *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid}
      body{margin:0;font-family:system-ui,-apple-system,sans-serif;line-height:1.5}
      h1,h2,h3,p{margin:0}
      button,input{font-family:inherit;font-size:100%;line-height:inherit;color:inherit}
      button{cursor:pointer}
      img{display:block;max-width:100%;height:auto}
      
      /* Header critical styles */
      header{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:1rem;background:white;border-bottom:1px solid #e5e7eb}
      .logo{display:inline-block;height:auto}
      nav{display:flex;align-items:center;gap:1rem}
      nav a{text-decoration:none;color:#374151;font-weight:500}
      
      /* Hero critical styles */
      .hero{position:relative;background:linear-gradient(to bottom right,#fff,#fff,rgba(0,124,255,0.05))}
      .hero-container{max-width:80rem;margin:0 auto;padding:4rem 1rem}
      .hero h1{font-size:clamp(2rem,5vw,3.75rem);font-weight:700;line-height:1.1;margin-bottom:1.5rem}
      .hero p{font-size:clamp(1.125rem,3vw,1.25rem);color:#6b7280;margin-bottom:2rem}
      .btn{display:inline-flex;align-items:center;justify-content:center;padding:0.75rem 1.5rem;font-weight:600;border-radius:0.5rem;background:#007CFF;color:white;text-decoration:none;transition:background 0.2s}
      .btn:hover{background:#0066CC}
      
      /* Dark mode */
      @media (prefers-color-scheme:dark){
        body{background:#09090b;color:#fafafa}
        header{background:#09090b;border-color:#27272a}
        nav a{color:#fafafa}
        .hero{background:linear-gradient(to bottom right,#09090b,#09090b,rgba(0,124,255,0.1))}
        .hero p{color:#a1a1aa}
      }
    </style>
    
    <!-- Optimized font loading with display=swap -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Lato:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
